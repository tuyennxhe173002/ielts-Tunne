services:
  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres
    environment:
      POSTGRES_DB: ielts_lms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ielts_lms"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lms-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ielts_lms
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: lms-access-secret-change-me
      JWT_REFRESH_SECRET: lms-refresh-secret-change-me
      NEXT_PUBLIC_WEB_ORIGIN: http://localhost:3000
      ASSET_URL_SECRET: lms-asset-secret-change-me
      ASSET_ACCESS_BASE_URL: http://localhost:4000
      ASSET_PUBLIC_BASE_URL: ""
      BUNNY_STREAM_API_KEY: replace-me
      BUNNY_STREAM_READONLY_KEY: replace-me
      BUNNY_STREAM_LIBRARY_ID: replace-me
      BUNNY_STREAM_PULL_ZONE: replace-me.b-cdn.net
      BUNNY_STREAM_EMBED_HOST: iframe.mediadelivery.net
      BUNNY_STREAM_SIGNING_KEY: replace-me
      R2_ACCOUNT_ID: replace-me
      R2_ACCESS_KEY_ID: replace-me
      R2_SECRET_ACCESS_KEY: replace-me
      RESEND_API_KEY: replace-me
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ChangeMe123!
    command: >
      sh -c "npx prisma migrate deploy && node prisma/seed.mjs && npm --workspace apps/api run start:prod"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
        NEXT_PUBLIC_WEB_ORIGIN: http://localhost:3000
    container_name: lms-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_WEB_ORIGIN: http://localhost:3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
